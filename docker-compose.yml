services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:8080"
    volumes:
      - .:/var/www/html
    environment:
      PHP_OPCACHE_ENABLE: "1"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: customers
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql

  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    command: [ "php", "/var/www/html/artisan", "queue:work", "--tries=3" ]
    stop_signal: SIGTERM
    healthcheck:
      # This is our native healthcheck script for the queue
      test: [ "CMD", "healthcheck-queue" ]
      start_period: 10s

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    command: [ "php", "/var/www/html/artisan", "reverb:start", "--port=8000" ]
    ports:
      - "8080:8000"
    stop_signal: SIGTERM
    healthcheck:
      test: [ "CMD", "healthcheck-reverb" ]
      start_period: 10s

  conversation_relay:
    image: golang:1.26.1-alpine
    working_dir: /var/www/html/conversation_relay
    volumes:
      - .:/var/www/html
    command: ["go", "run", "/var/www/html/conversation_relay/cmd/web"]
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    stop_signal: SIGTERM

volumes:
  db_data:
  redis_data:
